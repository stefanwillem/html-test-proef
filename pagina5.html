<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

</head>
<body>

  <header class="site-header">
    <nav class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">⚡</span>
        HTML Test Proef
      </a>
      <button class="nav-toggle" aria-label="Menu">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>

        <li><a href="pagina5.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>Contact</h1>
      <p>Test een formulier en contactgegevens. Het formulier is puur visueel — het verstuurt niets.</p>
    </section>

    <section class="container">
      <div class="form-card">
        <form onsubmit="event.preventDefault(); alert('Dit is een testformulier — er wordt niets verstuurd!');">
          <div class="form-group">
            <label for="naam">Naam</label>
            <input type="text" id="naam" name="naam" placeholder="Je volledige naam" required>
          </div>
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="jouw@email.nl" required>
          </div>
          <div class="form-group">
            <label for="onderwerp">Onderwerp</label>
            <select id="onderwerp" name="onderwerp">
              <option value="vraag">Algemene vraag</option>
              <option value="feedback">Feedback</option>
              <option value="samenwerking">Samenwerking</option>
            </select>
          </div>
          <div class="form-group">
            <label for="bericht">Bericht</label>
            <textarea id="bericht" name="bericht" placeholder="Schrijf hier je bericht..." required></textarea>
          </div>
          <button type="submit" class="btn">Verstuur bericht</button>
        </form>
      </div>

      <div class="container" style="padding-top: 2rem;">
        <ul class="info-list">
          <li><span class="icon">📧</span> stefan_vergeer@icloud.com</li>
          <li><span class="icon">🌐</span> github.com/stefanwillem</li>
          <li><span class="icon">📍</span> Nederland</li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>HTML Test Proef — <a href="index.html">Terug naar home</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>

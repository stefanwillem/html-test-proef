<!DOCTYPE html>

<head>

<body>

  <header class="site-header">
    <nav class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">⚡</span>
        HTML Test Project

        <li><a href="pagina5.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>Contact</h1>
      <p>Test a form and contact details. The form is visual only — it does not send anything.</p>
    </section>

    <section class="container">
      <div class="form-card">
        <form onsubmit="event.preventDefault(); alert('This is a test form — nothing will be sent!');">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@email.com" required>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject">
              <option value="question">General question</option>
              <option value="feedback">Feedback</option>
              <option value="collaboration">Collaboration</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
          </div>
          <button type="submit" class="btn">Send message</button>
        </form>
      </div>

      <div class="container" style="padding-top: 2rem;">
        <ul class="info-list">
          <li><span class="icon">📧</span> stefan_vergeer@icloud.com</li>
          <li><span class="icon">🌐</span> github.com/stefanwillem</li>
          <li><span class="icon">📍</span> Netherlands</li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>HTML Test Project — <a href="index.html">Back to home</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
